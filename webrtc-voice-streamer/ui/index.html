<!doctype html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebRTC Voice Streamer</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        surface: '#1e293b', // slate-800
                        bg: '#0f172a', // slate-900
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            /* Scrollbar styling */
            scrollbar-width: thin;
            scrollbar-color: #334155 #0f172a;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-6 bg-slate-900 text-slate-100 selection:bg-sky-500/30">
    <div class="max-w-3xl w-full space-y-6">
        <!-- Voice Streamer Card -->
        <div class="bg-slate-800/80 backdrop-blur-md rounded-2xl p-5 sm:p-6 shadow-xl border border-slate-700">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-semibold text-white tracking-tight">Voice Streamer</h2>
                <span id="ws-status" class="px-3 py-1 rounded-full text-sm font-medium bg-slate-700 text-slate-300 border border-slate-600 transition-colors duration-300">Disconnected</span>
            </div>

            <canvas id="visualizer" class="w-full h-28 sm:h-32 bg-slate-900 rounded-xl mb-6 shadow-inner border border-slate-700/50" width="600" height="128"></canvas>

            <button id="btn-mic" class="w-full bg-sky-500 hover:bg-sky-600 text-white border-none py-3 px-6 rounded-xl text-lg font-medium cursor-pointer transition-all duration-200 flex items-center justify-center gap-2 shadow-lg shadow-sky-500/20 active:scale-[0.98]">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                </svg>
                <span>Start Microphone</span>
            </button>
            <p id="mic-error-msg" class="text-red-400 text-sm mt-3 text-center empty:hidden"></p>
        </div>

        <!-- Media Player Card -->
        <div class="bg-slate-800/80 backdrop-blur-md rounded-2xl p-5 sm:p-6 shadow-xl border border-slate-700">
            <h2 class="text-xl font-semibold text-white mb-6">Play to Media Player</h2>

            <div class="space-y-5">
                <div>
                    <label for="stream-url" class="block text-sm font-medium text-slate-400 mb-2">Internal Audio Stream URL</label>
                    <input type="text" id="stream-url" placeholder="http://192.168.x.x:8081/stream/latest.mp3" class="w-full p-3 bg-slate-900 border border-slate-600 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent transition-all" />
                    <p class="text-xs text-slate-500 mt-2">This must be reachable by your smart speakers on the local network.</p>
                </div>

                <div>
                    <label for="media-player-select" class="block text-sm font-medium text-slate-400 mb-2">Select Media Player</label>
                    <select id="media-player-select" class="w-full p-3 bg-slate-900 border border-slate-600 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent transition-all cursor-pointer">
                        <option value="">Loading...</option>
                    </select>
                </div>

                <div class="flex flex-col sm:flex-row gap-3 pt-2">
                    <button id="btn-play" class="flex-1 bg-sky-500 hover:bg-sky-600 text-white border-none py-3 px-6 rounded-xl font-medium cursor-pointer transition-all duration-200 flex items-center justify-center gap-2 shadow-lg shadow-sky-500/20 active:scale-[0.98]">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" />
                        </svg>
                        Play Stream
                    </button>
                    <button id="btn-stop" class="flex-1 bg-transparent hover:bg-red-500/10 text-red-400 border border-red-500/50 py-3 px-6 rounded-xl font-medium cursor-pointer transition-all duration-200 flex items-center justify-center gap-2 active:scale-[0.98]">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H8z" clip-rule="evenodd" />
                        </svg>
                        Stop
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Error Log Section -->
        <div id="error-log-container" class="hidden bg-red-950/40 border border-red-900/50 rounded-2xl p-5 shadow-lg">
            <div class="flex items-center justify-between mb-3">
                <h3 class="text-red-400 font-semibold flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
                    </svg>
                    Error Logs
                </h3>
                <button id="clear-errors-btn" class="text-red-400 hover:text-red-300 text-sm px-3 py-1 rounded-lg hover:bg-red-900/30 border border-transparent hover:border-red-900/50 transition-all">Clear</button>
            </div>
            <div id="error-logs" class="space-y-2 max-h-48 overflow-y-auto font-mono text-xs sm:text-sm text-red-300/90 pr-2">
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let peerConnection = null;
        let mediaStream = null;
        let audioContext = null;
        let analyser = null;
        let animationFrame = null;

        const wsStatus = document.getElementById("ws-status");
        const btnMic = document.getElementById("btn-mic");
        const micErrorMsg = document.getElementById("mic-error-msg");
        const visualizer = document.getElementById("visualizer");
        const canvasCtx = visualizer.getContext("2d");

        const streamUrlInput = document.getElementById("stream-url");
        const mediaPlayerSelect = document.getElementById("media-player-select");
        const btnPlay = document.getElementById("btn-play");
        const btnStop = document.getElementById("btn-stop");

        const errorLogContainer = document.getElementById("error-log-container");
        const errorLogs = document.getElementById("error-logs");
        const clearErrorsBtn = document.getElementById("clear-errors-btn");

        // UI Error Logging Function
        function logError(message, err = null) {
            console.error(message, err || "");
            const time = new Date().toLocaleTimeString();
            const logEntry = document.createElement("div");
            logEntry.className = "py-1.5 border-b border-red-900/30 last:border-0";
            
            let errMsg = err ? (err.message || err.toString()) : "";
            // Avoid duplicate error message strings
            if (errMsg === message) errMsg = "";
            
            logEntry.textContent = `[${time}] ${message} ${errMsg ? " - " + errMsg : ""}`;
            errorLogs.prepend(logEntry);
            errorLogContainer.classList.remove("hidden");
        }

        clearErrorsBtn.onclick = () => {
            errorLogs.innerHTML = "";
            errorLogContainer.classList.add("hidden");
            console.log("Error logs cleared.");
        };

        // Initialize defaults
        const hostname = window.location.hostname || 'homeassistant.local';
        streamUrlInput.value = `http://${hostname}:8081/stream/latest.mp3`;

        // Helper to get HA object from parent window
        function getHass() {
            try {
                if (window.parent && window.parent.document) {
                    const ha = window.parent.document.querySelector("home-assistant");
                    if (ha && ha.hass) {
                        return ha.hass;
                    }
                }
            } catch (e) {
                console.warn("Cannot access parent Home Assistant object", e);
            }
            return null;
        }

        // Fetch Media Players
        async function fetchMediaPlayers() {
            console.log("Fetching media players...");
            try {
                const hass = getHass();
                let players = [];

                if (hass) {
                    console.log("Using HA frontend object to fetch media players.");
                    players = Object.values(hass.states)
                        .filter((entity) => entity.entity_id.startsWith("media_player."))
                        .map((entity) => ({
                            entity_id: entity.entity_id,
                            name: entity.attributes.friendly_name || entity.entity_id,
                            state: entity.state
                        }));
                } else {
                    console.log("HA frontend object not found. Using backend API /api/media_players.");
                    const res = await fetch("./api/media_players");
                    if (!res.ok) {
                        throw new Error(`HTTP error! status: ${res.status}`);
                    }
                    players = await res.json();
                    if (!Array.isArray(players)) {
                        throw new Error(players.error || "Invalid response from server");
                    }
                }

                console.log(`Found ${players.length} media players.`);
                mediaPlayerSelect.innerHTML = '<option value="">-- Select a Media Player --</option>';
                players.forEach((p) => {
                    const opt = document.createElement("option");
                    opt.value = p.entity_id;
                    opt.textContent = `${p.name} (${p.state})`;
                    mediaPlayerSelect.appendChild(opt);
                });
            } catch (e) {
                logError("Failed to load media players", e);
                mediaPlayerSelect.innerHTML = '<option value="">Failed to load</option>';
            }
        }

        function waitForHassAndInitialize(maxRetries = 10, interval = 500) {
            let retries = 0;
            const checkHass = () => {
                const hass = getHass();
                if (hass) {
                    console.log("Hass object found immediately. Proceeding to fetch media players.");
                    fetchMediaPlayers();
                } else if (retries < maxRetries) {
                    retries++;
                    console.log(`Waiting for hass object... (Attempt ${retries}/${maxRetries})`);
                    setTimeout(checkHass, interval);
                } else {
                    console.warn("Hass object not found after retries. Falling back to backend API.");
                    fetchMediaPlayers();
                }
            };
            checkHass();
        }

        waitForHassAndInitialize();

        // Setup WebSocket
        function connectWebSocket() {
            const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
            const wsPath = window.location.pathname.replace(/\/$/, "") + "/ws";
            const wsUrl = `${protocol}//${window.location.host}${wsPath}`;
            
            console.log(`Attempting WebSocket connection to: ${wsUrl}`);
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log("WebSocket connection opened successfully.");
                wsStatus.textContent = "Connected";
                wsStatus.className = "px-3 py-1 rounded-full text-sm font-medium bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 transition-colors duration-300";
            };

            ws.onclose = () => {
                console.log("WebSocket connection closed. Attempting to reconnect in 3 seconds...");
                wsStatus.textContent = "Disconnected";
                wsStatus.className = "px-3 py-1 rounded-full text-sm font-medium bg-red-500/20 text-red-400 border border-red-500/30 transition-colors duration-300";
                stopMic();
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = (err) => {
                logError("WebSocket encountered an error.", err);
            };

            ws.onmessage = async (e) => {
                console.log("WebSocket message received:", e.data);
                try {
                    const msg = JSON.parse(e.data);

                    if (msg.type === "sender_ready") {
                        console.log("Sender ready received, creating WebRTC offer...");
                        if (peerConnection) {
                            const offer = await peerConnection.createOffer({
                                offerToReceiveAudio: false,
                                offerToReceiveVideo: false,
                            });
                            await peerConnection.setLocalDescription(offer);
                            console.log("Sending WebRTC offer over WebSocket...");
                            ws.send(JSON.stringify({
                                type: "webrtc_offer",
                                offer: {
                                    sdp: peerConnection.localDescription.sdp,
                                    type: peerConnection.localDescription.type,
                                },
                            }));
                        } else {
                            console.warn("Peer connection not initialized when sender_ready received.");
                        }
                    } else if (msg.type === "webrtc_answer") {
                        console.log("Received WebRTC answer. Setting remote description...");
                        if (peerConnection) {
                            await peerConnection.setRemoteDescription(new RTCSessionDescription(msg.answer));
                            console.log("Remote description set successfully. WebRTC connection established.");
                        } else {
                            console.warn("Peer connection not initialized when webrtc_answer received.");
                        }
                    } else if (msg.type === "error") {
                        logError("Received error from signaling server: " + msg.message);
                    } else {
                        console.log("Received unknown message type:", msg.type);
                    }
                } catch (err) {
                    logError("Failed to handle WebSocket message.", err);
                }
            };
        }

        connectWebSocket();

        // Start/Stop Mic
        btnMic.onclick = async () => {
            console.log("Microphone button clicked. Current state:", mediaStream ? "Active" : "Inactive");
            if (mediaStream) {
                stopMic();
            } else {
                await startMic();
            }
        };

        async function startMic() {
            micErrorMsg.textContent = "";
            console.log("Requesting microphone access from browser...");
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true,
                        sampleRate: 16000,
                        channelCount: 1,
                    },
                });
                console.log("Microphone access granted.", mediaStream);

                peerConnection = new RTCPeerConnection({ iceServers: [] });
                
                peerConnection.oniceconnectionstatechange = () => {
                    console.log("ICE Connection State Change:", peerConnection.iceConnectionState);
                    if (peerConnection.iceConnectionState === "failed") {
                        logError("WebRTC ICE Connection failed.");
                    }
                };

                mediaStream.getAudioTracks().forEach((track) => {
                    console.log("Adding audio track to peer connection:", track.label);
                    peerConnection.addTrack(track, mediaStream);
                });

                setupVisualization(mediaStream);

                console.log("Sending start_sending command over WebSocket.");
                ws.send(JSON.stringify({ type: "start_sending" }));

                // Update UI state to "Stop"
                btnMic.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z" />
                    </svg>
                    <span>Stop Microphone</span>
                `;
                btnMic.className = "w-full bg-red-500 hover:bg-red-600 text-white border-none py-3 px-6 rounded-xl text-lg font-medium cursor-pointer transition-all duration-200 flex items-center justify-center gap-2 shadow-lg shadow-red-500/20 active:scale-[0.98]";
            } catch (e) {
                logError("Failed to start microphone", e);
                micErrorMsg.textContent = "Error: " + e.message;
            }
        }

        function stopMic() {
            console.log("Stopping microphone and cleaning up WebRTC resources...");
            if (mediaStream) {
                mediaStream.getTracks().forEach((t) => {
                    console.log("Stopping track:", t.kind, t.label);
                    t.stop();
                });
                mediaStream = null;
                console.log("Media stream stopped.");
            }
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
                console.log("Peer connection closed.");
            }
            if (ws && ws.readyState === WebSocket.OPEN) {
                console.log("Sending stop_stream command over WebSocket.");
                ws.send(JSON.stringify({ type: "stop_stream" }));
            }
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }

            canvasCtx.clearRect(0, 0, visualizer.width, visualizer.height);
            
            // Reset UI state to "Start"
            btnMic.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                </svg>
                <span>Start Microphone</span>
            `;
            btnMic.className = "w-full bg-sky-500 hover:bg-sky-600 text-white border-none py-3 px-6 rounded-xl text-lg font-medium cursor-pointer transition-all duration-200 flex items-center justify-center gap-2 shadow-lg shadow-sky-500/20 active:scale-[0.98]";
        }

        function setupVisualization(stream) {
            console.log("Setting up audio visualization canvas.");
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            const source = audioContext.createMediaStreamSource(stream);
            source.connect(analyser);

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function draw() {
                animationFrame = requestAnimationFrame(draw);
                analyser.getByteFrequencyData(dataArray);

                canvasCtx.fillStyle = "#0f172a"; // Tailwind slate-900 equivalent for canvas clear
                canvasCtx.fillRect(0, 0, visualizer.width, visualizer.height);

                const barWidth = (visualizer.width / bufferLength) * 2.5;
                let x = 0;

                for (let i = 0; i < bufferLength; i++) {
                    const barHeight = (dataArray[i] / 255) * visualizer.height;
                    // Draw bars using sky-500 base color (rgba 14, 165, 233)
                    const opacity = Math.max(0.15, dataArray[i] / 255);
                    canvasCtx.fillStyle = `rgba(14, 165, 233, ${opacity})`;
                    canvasCtx.fillRect(x, visualizer.height - barHeight, barWidth, barHeight);
                    x += barWidth + 1;
                }
            }
            draw();
        }

        // Media Player Controls
        btnPlay.onclick = async () => {
            const entity_id = mediaPlayerSelect.value;
            const media_content_id = streamUrlInput.value;
            console.log(`Play requested. Target player: ${entity_id}, URL: ${media_content_id}`);
            
            if (!entity_id) {
                logError("Validation failed: Please select a media player first.");
                return;
            }
            if (!media_content_id) {
                logError("Validation failed: Please enter a stream URL.");
                return;
            }

            const hass = getHass();
            if (hass) {
                console.log("Using HA Frontend to invoke media_player.play_media service.");
                try {
                    await hass.callService("media_player", "play_media", {
                        entity_id: entity_id,
                        media_content_id: media_content_id,
                        media_content_type: "music"
                    });
                    console.log("HA Frontend play_media service call successful.");
                    return;
                } catch (e) {
                    logError("Error playing media via HA Frontend service call.", e);
                    return;
                }
            }

            console.log("HA Frontend object not available. Falling back to backend /api/play_media.");
            try {
                const res = await fetch("./api/play_media", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ entity_id, media_content_id }),
                });
                if (!res.ok) {
                    const errorText = await res.text();
                    throw new Error(`Status ${res.status}: ${errorText}`);
                }
                console.log("Backend play_media API call successful.");
            } catch (e) {
                logError("Error playing media via backend API.", e);
            }
        };

        btnStop.onclick = async () => {
            const entity_id = mediaPlayerSelect.value;
            console.log(`Stop requested. Target player: ${entity_id}`);
            
            if (!entity_id) {
                logError("Validation failed: Please select a media player first.");
                return;
            }

            const hass = getHass();
            if (hass) {
                console.log("Using HA Frontend to invoke media_player.media_stop service.");
                try {
                    await hass.callService("media_player", "media_stop", {
                        entity_id: entity_id
                    });
                    console.log("HA Frontend media_stop service call successful.");
                    return;
                } catch (e) {
                    logError("Error stopping media via HA Frontend service call.", e);
                    return;
                }
            }

            console.log("HA Frontend object not available. Falling back to backend /api/stop_media.");
            try {
                const res = await fetch("./api/stop_media", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ entity_id }),
                });
                if (!res.ok) {
                    const errorText = await res.text();
                    throw new Error(`Status ${res.status}: ${errorText}`);
                }
                console.log("Backend stop_media API call successful.");
            } catch (e) {
                logError("Error stopping media via backend API.", e);
            }
        };
    </script>
</body>
</html>
